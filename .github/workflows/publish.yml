name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

permissions:
  id-token: write  # Required for npm Trusted Publishing (OIDC)
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm CLI >= 11.5.1 and Node >= 22.14.0.
      # Node 22 may bundle an npm older than 11.5.1, so upgrade to the latest npm
      # to guarantee OIDC support. The npm CLI >= 11.5.1 auto-detects OIDC
      # environments and uses them for authentication before falling back to
      # traditional tokens, so no _authToken stripping is needed. See
      # https://docs.npmjs.com/trusted-publishers/.
      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check whether version changed
        id: check-version
        run: |
          set -euo pipefail
          local_version="$(node -p "require('./package.json').version")"
          echo "Local version: ${local_version}"
          published_version="$(npm view @sarveshkhetan/shh version 2>/dev/null || echo "")"
          echo "Published version: ${published_version:-<none>}"
          if [ -n "$published_version" ] && [ "$published_version" = "$local_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "version=${local_version}" >> "$GITHUB_OUTPUT"
            echo "version ${local_version} already published, skipping"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=${local_version}" >> "$GITHUB_OUTPUT"
            echo "version ${local_version} is new (published: ${published_version:-<none>}), will publish"
          fi

      - name: Publish to npm
        if: steps.check-version.outputs.changed == 'true'
        run: npm publish --provenance --access public

      - name: Summary
        if: always()
        run: |
          local_version="${{ steps.check-version.outputs.version }}"
          if [ "${{ steps.check-version.outputs.changed }}" = "true" ]; then
            echo "Published @sarveshkhetan/shh@${local_version} via Trusted Publishing (OIDC)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Skipped publish: @sarveshkhetan/shh@${local_version} is already on npm." >> "$GITHUB_STEP_SUMMARY"
          fi
